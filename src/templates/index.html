<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Regulatory RAG Chat</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@1.9.2"></script>
</head>

<body>

<header class="topbar">
<h1>📘 Regulatory RAG Chat</h1>
<p class="muted">
Ask regulatory questions and see source citations + evaluation metrics.
</p>
</header>

<main class="main-grid">

<!-- ================================================= -->
<!-- LEFT PANEL -->
<!-- ================================================= -->

<section class="panel">

<h2>📂 Ingest Document</h2>

<form id="ingest-form" action="/ingest">

<input
type="file"
name="file"
id="file-input"
required
/>

<div class="row">

<button
type="submit"
class="btn"
id="ingest-btn"
>
Ingest
</button>

<div id="ingest-result" class="inline-msg"></div>

</div>

</form>

<hr />

<h3>Documents</h3>

<div id="documents-list">
Loading…
</div>

</section>

<!-- ================================================= -->
<!-- CHAT PANEL -->
<!-- ================================================= -->

<section class="panel chat-panel">

<div class="chat-header">

<h2>💬 Chat</h2>

<div class="controls">
<label for="doc-filter">Restrict</label>
<select id="doc-filter"></select>
</div>

</div>

<div
id="chat-window"
class="chat-window"
aria-live="polite"
></div>

<form
id="query-form"
class="query-form"
action="/query"
>

<input
type="hidden"
id="thread-id"
name="thread_id"
/>

<textarea
name="question"
id="question-input"
rows="2"
placeholder="Ask a regulatory question..."
required
></textarea>

<div class="row">
<button type="submit" class="btn primary">
Send
</button>

<div id="query-status" class="inline-msg"></div>
</div>

</form>

</section>

</main>

<script>

/* ================================================= */
/* UUID */
/* ================================================= */

function uuid(){

    if(window.crypto && crypto.randomUUID){
        return crypto.randomUUID();
    }

    return "session-" + Math.random().toString(36).slice(2,10);
}

/* ================================================= */
/* Global State */
/* ================================================= */

let chatHistoryByDoc = {};
let threadByDoc = {};
let currentDoc = null;

const threadIdEl =
document.getElementById("thread-id");

/* ================================================= */
/* Refresh Documents */
/* ================================================= */

async function refreshDocuments(){

    try{

        const res = await fetch("/documents");
        const docs = await res.json();

        const list =
        document.getElementById("documents-list");

        const sel =
        document.getElementById("doc-filter");

        list.innerHTML = "";
        sel.innerHTML = "";

        const allOpt =
        document.createElement("option");

        allOpt.value = "";
        allOpt.textContent = "All documents";

        sel.appendChild(allOpt);

        if(!docs || docs.length === 0){

            list.innerHTML =
            "<p class='muted'>No documents</p>";

            return;
        }

        const ul = document.createElement("ul");

        for(const d of docs){

            const li = document.createElement("li");

            li.innerHTML =
            `
            <strong>${escapeHtml(d.title)}</strong>
            <span class="muted">
            (${d.id || "—"})
            </span>
            `;

            const del =
            document.createElement("button");

            del.textContent = "Delete";

            del.className =
            "btn small danger";

            del.style.marginLeft = "10px";

            del.onclick = async ()=>{

                if(!confirm(`Delete '${d.title}'?`)){
                    return;
                }

                const r = await fetch(
                    "/documents/" + encodeURIComponent(d.title),
                    {method:"DELETE"}
                );

                if(r.ok){

                    refreshDocuments();

                    appendSystemMessage(
                        `Deleted '${d.title}'`
                    );

                }else{

                    appendSystemMessage(
                        "Delete failed"
                    );
                }
            };

            li.appendChild(del);
            ul.appendChild(li);

            const op =
            document.createElement("option");

            op.value = d.title;
            op.textContent = d.title;

            sel.appendChild(op);
        }

        list.appendChild(ul);

    }catch(e){

        document.getElementById("documents-list")
        .innerHTML =
        "<p class='muted'>Error loading documents</p>";
    }
}

/* ================================================= */
/* Escape HTML */
/* ================================================= */

function escapeHtml(s){

    return (s+"").replace(
        /[&<>\\"]/g,
        c => ({
            "&":"&amp;",
            "<":"&lt;",
            ">":"&gt;",
            '"':"&quot;"
        }[c])
    );
}

/* ================================================= */
/* Chat Rendering */
/* ================================================= */

function appendUserMessage(text){

    const win =
    document.getElementById("chat-window");

    const div =
    document.createElement("div");

    div.className = "chat-msg user";

    div.innerHTML =
    `<div class="bubble">${escapeHtml(text)}</div>`;

    win.appendChild(div);

    win.scrollTop = win.scrollHeight;
}

function appendAssistantMessage(
    text,
    citations,
    evaluation
){

    const win =
    document.getElementById("chat-window");

    const div =
    document.createElement("div");

    div.className = "chat-msg assistant";

    let html =
    `<div class="bubble structured">`;

    html += `
    <div class="answer-text">
        ${escapeHtml(text)}
    </div>
    `;

    if(citations && citations.length){

        html += `
        <details class="citations">
        <summary>📑 Citations</summary>
        <ul>
        `;

        for(const c of citations){

            const src =
            c.source || "unknown";

            const docid =
            c.document_id || "unknown";

            const chunk =
            c.chunk_id || "unknown";

            html += `
            <li>
                <strong>${escapeHtml(src)}</strong>

                <br/>

                Document ID:
                <code>${escapeHtml(docid)}</code>

                <br/>

                Chunk ID:
                <code>${escapeHtml(chunk)}</code>
            </li>
            `;
        }

        html += `
        </ul>
        </details>
        `;
    }

    if(evaluation){

        const grounding =
        evaluation.grounding_score ?? 0;

        const groundingEmoji =
        grounding > 0.8
        ? "🟢"
        : grounding > 0.5
        ? "🟡"
        : "🔴";

        html += `
        <details class="evaluation-box" open>

        <summary>
        Evaluation Metrics
        </summary>

        <div class="metric-row">
            ${groundingEmoji}
            Grounding Score:
            <strong>
            ${Number(
                evaluation.grounding_score || 0
            ).toFixed(2)}
            </strong>
        </div>

        <div class="metric-row">
            Judge Score:
            <strong>
            ${Number(
                evaluation.judge_score || 0
            ).toFixed(2)}
            / 5
            </strong>
        </div>

        <div class="metric-row">
            Citation Score:
            <strong>
            ${Number(
                evaluation.citation_score || 0
            ).toFixed(2)}
            </strong>
        </div>

        <div class="metric-row">
            Pipeline Latency:
            <strong>
            ${evaluation.pipeline_latency_ms || 0}
            ms
            </strong>
        </div>

        <div class="metric-row">
            Evaluation Latency:
            <strong>
            ${evaluation.latency_ms || 0}
            ms
            </strong>
        </div>

        <div class="metric-row">
            Citations Used:
            <strong>
            ${evaluation.num_citations || 0}
            </strong>
        </div>

        </details>
        `;
    }

    html += `</div>`;

    div.innerHTML = html;

    win.appendChild(div);

    win.scrollTop = win.scrollHeight;
}

function appendSystemMessage(text){

    const win =
    document.getElementById("chat-window");

    const div =
    document.createElement("div");

    div.className = "chat-msg system";

    div.innerHTML =
    `<div class="bubble muted">
        ${escapeHtml(text)}
    </div>`;

    win.appendChild(div);

    win.scrollTop = win.scrollHeight;
}

/* ================================================= */
/* Save / Restore Chats */
/* ================================================= */

function saveCurrentChat(){

    if(!currentDoc){
        return;
    }

    const win =
    document.getElementById("chat-window");

    chatHistoryByDoc[currentDoc] =
    win.innerHTML;
}

function restoreChat(doc){

    const win =
    document.getElementById("chat-window");

    if(chatHistoryByDoc[doc]){
        win.innerHTML = chatHistoryByDoc[doc];
    }else{
        win.innerHTML = "";
    }
}

/* ================================================= */
/* Document Change */
/* ================================================= */

document
.getElementById("doc-filter")
.addEventListener("change", function(){

    const newDoc = this.value;

    saveCurrentChat();

    currentDoc = newDoc;

    restoreChat(newDoc);

    threadByDoc[newDoc] = uuid();

    threadIdEl.value =
    threadByDoc[newDoc];
});

/* ================================================= */
/* Ingest */
/* ================================================= */

document
.getElementById("ingest-form")
.addEventListener("submit", function(ev){

    ev.preventDefault();

    const form = ev.currentTarget;

    const fd = new FormData(form);

    const fileInput =
    document.getElementById("file-input");

    const ingestBtn =
    document.getElementById("ingest-btn");

    /* Disable During Upload */

    fileInput.disabled = true;

    ingestBtn.disabled = true;

    ingestBtn.textContent = "Ingesting...";

    document.getElementById("ingest-result")
    .textContent = "Uploading...";

    fetch(form.action, {

        method:"POST",

        body:fd

    })
    .then(async r => {

        const data =
        await r.json().catch(()=>null);

        if(data && data.message){

            document.getElementById("ingest-result")
            .textContent = data.message;

        }else{

            document.getElementById("ingest-result")
            .textContent = "Ingest completed";
        }

        refreshDocuments();

        /* Re-enable */

        fileInput.disabled = false;

        ingestBtn.disabled = false;

        ingestBtn.textContent = "Ingest";

    })
    .catch(()=>{

        document.getElementById("ingest-result")
        .textContent = "Upload failed";

        /* Re-enable On Error */

        fileInput.disabled = false;

        ingestBtn.disabled = false;

        ingestBtn.textContent = "Ingest";

    });
});

/* ================================================= */
/* Query */
/* ================================================= */

document
.getElementById("query-form")
.addEventListener("submit", function(ev){

    ev.preventDefault();

    const q =
    document.getElementById("question-input").value;

    const filterSel =
    document.getElementById("doc-filter");

    const selected = filterSel.value;

    if(!selected){

        appendSystemMessage(
            "Please select a document before asking a question."
        );

        return;
    }

    const payload = {
        question:q,
        thread_id:threadIdEl.value,
        filters:{
            title:selected
        }
    };

    appendUserMessage(q);

    document.getElementById("query-status")
    .textContent = "Thinking...";

    fetch("/query", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(payload)

    })
    .then(async r => {

        const data = await r.json();

        document.getElementById("query-status")
        .textContent = "";

        appendAssistantMessage(
            data.answer || "(no answer)",
            data.citations || [],
            data.evaluation || null
        );

    })
    .catch(()=>{

        document.getElementById("query-status")
        .textContent = "Error";

        appendSystemMessage("Query failed");

    })
    .finally(()=>{

        document.getElementById("question-input")
        .value = "";
    });
});

/* ================================================= */
/* Init */
/* ================================================= */

refreshDocuments();

</script>

</body>
</html>
